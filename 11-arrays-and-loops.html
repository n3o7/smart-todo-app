<!DOCTYPE html>
<html>
  <head>
    <title>
      Todo List
    </title>
    <link rel="stylesheet" href="styles/style.css">
  </head>
  <body>
    <div class="todo-app">
      <h1 class="todo-title">Todo List</h1>
      <div class="todo-form">

        <input class="final-todo-name input-text-box" type="text" placeholder="Todo name" name="" id="">
        <input class="js-date date-text-box" type="date" name="" id=""> 
        <button class ="add-button" onclick="addToDo();" >Add</button>

      </div>
      <div class="filter-buttons">

        <button onclick = "showAll(); " class = "filter-button allFilterButton">All</button>
        <button onclick="filterToday(); " class = "filter-button todayFilterButton">Today</button>
        <button onclick="filterUpcoming(); " class = "filter-button upcomingFilterButton">Upcoming</button>

    </div>
    
      <div class="final-todo-list"></div>

    </div>
    
  </body>
  <script src="scripts/11-arrays-and-loops.js">
  </script>
</html>
